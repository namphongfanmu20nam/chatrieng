services:
  - type: web
    name: privchat
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT --app-dir .
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: privchat-db
          property: connectionString

databases:
  - name: privchat-db
    plan: free
